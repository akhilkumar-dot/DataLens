version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: insights-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - insights-net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: insights-redis
    ports:
      - "6379:6379"
    networks:
      - insights-net
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: insights-backend
    ports:
      - "4000:4000"
    env_file:
      - ./backend/.env
    depends_on:
      - mongodb
      - redis
    networks:
      - insights-net
    restart: unless-stopped

  ai-service:
    build: ./ai-service
    container_name: insights-ai
    ports:
      - "8000:8000"
    env_file:
      - ./ai-service/.env
    networks:
      - insights-net
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: insights-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - insights-net
    restart: unless-stopped

volumes:
  mongo-data:

networks:
  insights-net:
    driver: bridge
